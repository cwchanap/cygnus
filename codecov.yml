coverage:
  status:
    project:
      default:
        target: auto
        threshold: 1%
        informational: true
        base: auto
    patch:
      default:
        target: auto
        threshold: 1%
        informational: true
        base: auto

comment:
  layout: "reach,diff,flags,tree"
  behavior: default
  require_changes: false

ignore:
  - "**/*.test.ts"
  - "**/*.spec.ts"
  - "**/test-setup.ts"
  - "tests/**"
  - "**/*.d.ts"
  - "**/*.config.*"